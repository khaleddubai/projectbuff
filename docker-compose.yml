# =============================================================================
# AEGIS — Docker Compose
# Orchestrates the full stack: PostgreSQL + API (Express) + Web (Next.js)
# =============================================================================

services:
  # ---- Redis (BullMQ job queue backend) ----
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - aegis-network

  # ---- PostgreSQL Database ----
  postgres:
    image: pgvector/pgvector:pg17
    container_name: aegis-db
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-aegis}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-aegis_secret}
      POSTGRES_DB: ${PG_DATABASE:-aegis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-aegis} -d ${PG_DATABASE:-aegis}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    networks:
      - aegis-network

  # ---- API Service (Express + PostgreSQL) ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: aegis-api
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${PG_USER:-aegis}:${PG_PASSWORD:-aegis_secret}@postgres:5432/${PG_DATABASE:-aegis}?schema=public
      - REDIS_URL=redis://redis:6379
      - AEGIS_OUTPUT_DIR=/app/output
      - MASTER_API_KEY=${MASTER_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - CORS_ALLOW_ALL=false
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen3-coder-480b-a35b-instruct}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - aegis_output:/app/output
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - aegis-network

  # ---- Web App (Next.js) ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: aegis-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - aegis-network

volumes:
  postgres_data:
    driver: local
  aegis_output:
    driver: local

networks:
  aegis-network:
    driver: bridge
